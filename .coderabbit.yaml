# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# Focus CodeRabbit on real bugs/correctness at ANY severity + architecture; suppress only pure style.
language: "en-US"
tone_instructions: "Flag real bugs and correctness/logic/edge-case issues at any severity, plus architectural concerns. Skip only pure style (formatting/naming)."
reviews:
  profile: chill
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "development"
      - "staging"
      - "production"
  path_instructions:
    - path: "**/*"
      instructions: |
        Report EVERY genuine bug or correctness issue REGARDLESS of severity —
        severity must NOT gate reporting; a real but minor bug should still be
        flagged. This includes: logic errors, off-by-one, null/undefined and
        unhandled cases, race conditions, incorrect error handling, state/order
        bugs, data/schema/column mismatches, security/auth flaws, broken
        contracts between layers (MCP handlers <-> repositories <-> DB), and
        architectural concerns (broken boundaries, leaky abstractions,
        violations of "LLM describes, engine validates, database is the source
        of truth", significant new coupling).
        Only skip PURE STYLE with no behavioral impact: formatting, naming,
        import order, comment/doc wording, or subjective refactors.
